services:
  kafka:
    image: apache/kafka:3.8.1
    ports:
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "controller,broker"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,EXTERNAL://:29092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"

  emqx:
    image: emqx/emqx-enterprise:5.8.4
    depends_on:
      - kafka
    ports:
      - "18884:1883"
      - "18084:18083"

  spark-master:
    image: thesis-topk-spark:local
    depends_on:
      - kafka
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"
    environment:
      SPARK_NO_DAEMONIZE: "true"

  spark-worker:
    image: thesis-topk-spark:local
    depends_on:
      - spark-master
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --webui-port
      - "8081"
      - --cores
      - "2"
      - --memory
      - 2g
    ports:
      - "8081:8081"
    environment:
      SPARK_NO_DAEMONIZE: "true"

  spark-submit:
    image: thesis-topk-spark:local
    depends_on:
      - spark-master
      - spark-worker
      - kafka
    profiles:
      - job
    command:
      - /opt/spark/bin/spark-submit
      - --master
      - spark://spark-master:7077
      - --deploy-mode
      - client
      - --class
      - com.thesis.topk.spark.ProbabilisticTopKSparkJob
      - /opt/spark/app/topk-spark.jar
      - --sparkMaster=spark://spark-master:7077
      - --dataset=synthetic
      - --objects=200
      - --queries=2
      - --dimensions=4
      - --k=10
      - --partitions=4
