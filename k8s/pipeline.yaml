apiVersion: v1
kind: Namespace
metadata:
  name: thesis-streaming
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: thesis-streaming
spec:
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: thesis-streaming
spec:
  serviceName: kafka
  replicas: 1
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
        - name: kafka
          image: apache/kafka:3.8.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9092
              name: broker
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_NODE_ID
              value: "1"
            - name: KAFKA_PROCESS_ROLES
              value: "controller,broker"
            - name: KAFKA_CONTROLLER_QUORUM_VOTERS
              value: "1@kafka:9093"
            - name: KAFKA_LISTENERS
              value: "PLAINTEXT://:9092,CONTROLLER://:9093"
            - name: KAFKA_ADVERTISED_LISTENERS
              value: "PLAINTEXT://kafka:9092"
            - name: KAFKA_LISTENER_SECURITY_PROTOCOL_MAP
              value: "PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT"
            - name: KAFKA_CONTROLLER_LISTENER_NAMES
              value: "CONTROLLER"
            - name: KAFKA_INTER_BROKER_LISTENER_NAME
              value: "PLAINTEXT"
            - name: KAFKA_AUTO_CREATE_TOPICS_ENABLE
              value: "true"
            - name: KAFKA_LOG_DIRS
              value: "/kafka/kraft-combined-logs"
            - name: KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR
              value: "1"
            - name: KAFKA_TRANSACTION_STATE_LOG_MIN_ISR
              value: "1"
          volumeMounts:
            - name: kafka-data
              mountPath: /kafka
  volumeClaimTemplates:
    - metadata:
        name: kafka-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: emqx-config
  namespace: thesis-streaming
data:
  emqx.conf: |
    node {
      cookie = "thesis-streaming-cookie"
      data_dir = "/opt/emqx/data"
    }

    listeners.tcp.default {
      bind = "0.0.0.0:1883"
    }

    dashboard.listeners.http {
      bind = 18083
    }

    connectors.kafka_producer.kafka_ingress {
      enable = true
      bootstrap_hosts = "kafka:9092"
    }

    actions.kafka_producer.raw_incomplete_to_kafka_thesis_raw {
      enable = true
      connector = "kafka_ingress"
      parameters {
        topic = "thesis.raw.incomplete"
        message {
          key = "${clientid}"
          value = "${payload}"
        }
      }
    }

    rule_engine.rules.mqtt_raw_to_kafka_thesis_raw {
      enable = true
      sql = "SELECT payload, clientid, topic, timestamp FROM \"thesis/raw\""
      actions = ["kafka_producer:raw_incomplete_to_kafka_thesis_raw"]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: emqx
  namespace: thesis-streaming
spec:
  selector:
    app: emqx
  ports:
    - name: mqtt
      port: 1883
      targetPort: 1883
    - name: dashboard
      port: 18083
      targetPort: 18083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: emqx
  namespace: thesis-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: emqx
  template:
    metadata:
      labels:
        app: emqx
    spec:
      containers:
        - name: emqx
          image: emqx/emqx-enterprise:5.8.4
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1883
              name: mqtt
            - containerPort: 18083
              name: dashboard
          volumeMounts:
            - name: emqx-config
              mountPath: /opt/emqx/etc/emqx.conf
              subPath: emqx.conf
      volumes:
        - name: emqx-config
          configMap:
            name: emqx-config
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: incomplete-data-publisher
  namespace: thesis-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: incomplete-data-publisher
  template:
    metadata:
      labels:
        app: incomplete-data-publisher
    spec:
      containers:
        - name: publisher
          image: thesis-simulator:local
          imagePullPolicy: IfNotPresent
          args:
            - --mqtt-host=emqx
            - --mqtt-port=1883
            - --topic=thesis/raw
            - --dataset=synthetic
            - --objects=500
            - --dimensions=4
            - --queries=2
            - --missing-rate=0.35
            - --rate-per-second=25
            - --repeat=0
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: spark-defaults
  namespace: thesis-streaming
  labels:
    app: spark
data:
  spark-defaults.conf: |+
    spark.serializer org.apache.spark.serializer.KryoSerializer
    spark.sql.shuffle.partitions 4
    spark.eventLog.enabled false
---
apiVersion: v1
kind: Service
metadata:
  name: spark-master
  namespace: thesis-streaming
spec:
  selector:
    app: spark
    component: master
  ports:
    - name: cluster
      port: 7077
      targetPort: 7077
    - name: webui
      port: 8080
      targetPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-master
  namespace: thesis-streaming
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spark
      component: master
  template:
    metadata:
      labels:
        app: spark
        component: master
    spec:
      containers:
        - name: master
          image: thesis-topk-spark:local
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
          args:
            - org.apache.spark.deploy.master.Master
            - --host
            - spark-master
            - --port
            - "7077"
            - --webui-port
            - "8080"
          ports:
            - containerPort: 7077
              name: cluster
            - containerPort: 8080
              name: webui
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          volumeMounts:
            - name: spark-defaults
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
      volumes:
        - name: spark-defaults
          configMap:
            name: spark-defaults
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: spark-worker
  namespace: thesis-streaming
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spark
      component: worker
  template:
    metadata:
      labels:
        app: spark
        component: worker
    spec:
      containers:
        - name: worker
          image: thesis-topk-spark:local
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-class
          args:
            - org.apache.spark.deploy.worker.Worker
            - spark://spark-master:7077
            - --webui-port
            - "8081"
            - --cores
            - "2"
            - --memory
            - 2g
          ports:
            - containerPort: 8081
              name: webui
          env:
            - name: SPARK_NO_DAEMONIZE
              value: "true"
          volumeMounts:
            - name: spark-defaults
              mountPath: /opt/spark/conf/spark-defaults.conf
              subPath: spark-defaults.conf
      volumes:
        - name: spark-defaults
          configMap:
            name: spark-defaults
---
apiVersion: batch/v1
kind: Job
metadata:
  name: spark-topk-submit
  namespace: thesis-streaming
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: spark
        component: submit
    spec:
      restartPolicy: OnFailure
      containers:
        - name: spark-submit
          image: thesis-topk-spark:local
          imagePullPolicy: IfNotPresent
          command:
            - /opt/spark/bin/spark-submit
          args:
            - --master
            - spark://spark-master:7077
            - --deploy-mode
            - client
            - --class
            - com.thesis.topk.spark.ProbabilisticTopKSparkJob
            - /opt/spark/app/topk-spark.jar
            - --source=kafka
            - --kafkaBootstrap=kafka:9092
            - --kafkaTopic=thesis.raw.incomplete
            - --kafkaGroupId=probabilistic-topk-spark-k8s
            - --expectedMessages=1000
            - --dataset=synthetic
            - --objects=500
            - --dimensions=4
            - --queries=2
            - --k=10
            - --missingRate=0.35
            - --partitions=4
            - --synopsisBins=8
            - --sparkMaster=spark://spark-master:7077
            - --kafkaReadTimeoutMs=180000
